databases:
  - name: polsia-db
    databaseName: polsia
    user: polsia
    plan: free
    ipAllowList: []

services:
  # ─── Backend API (Docker) ────────────────────────────────────────────────────
  - type: web
    name: polsia-api
    env: docker
    repo: https://github.com/guish7423/polsia-fork
    branch: main
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: polsia-db
          property: connectionString
      - key: API_KEY
        generateValue: true
      - key: LLM_API_MOCK
        value: "true"
      - key: LLM_API_URL
        value: https://api.deepseek.com/v1
      - key: LLM_API_KEY
        sync: false  # User to set in Dashboard
      - key: LLM_MODEL
        value: deepseek-chat
      - key: REDIS_URL
        value: ""  # No Redis in free tier — Celery disabled
      - key: CELERY_BROKER_URL
        value: ""
      - key: CELERY_RESULT_BACKEND
        value: ""
      - key: DEBUG
        value: "false"
      - key: CHROMA_PERSIST_DIR
        value: /app/data/chroma
    disk:
      name: chroma-data
      mountPath: /app/data/chroma
      sizeGB: 1

  # ─── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: static
    name: polsia-frontend
    repo: https://github.com/guish7423/polsia-fork
    branch: main
    buildCommand: cd frontend && npm ci && npm run build && npx next export -o out
    publishPath: frontend/out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: polsia-api
          type: web
          property: host
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          name: polsia-api
          type: web
          property: host
          scheme: ws
